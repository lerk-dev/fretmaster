name: Build Windows App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        shell: pwsh
        run: |
          $rustupPath = "$env:USERPROFILE\.cargo\bin"
          if (-not (Test-Path "$rustupPath\rustc.exe")) {
            Invoke-WebRequest -Uri 'https://win.rustup.rs/x86_64' -OutFile 'rustup-init.exe'
            .\rustup-init.exe -y --default-toolchain stable --target x86_64-pc-windows-msvc
          }
          "$rustupPath" | Out-File -FilePath $env:GITHUB_PATH -Append
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Verify Rust
        shell: pwsh
        run: |
          rustc --version
          cargo --version

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        run: npm run build
        env:
          TAURI_BUILD: true

      - name: Build Tauri App
        shell: pwsh
        run: |
          $env:PATH = "$env:PATH;$env:USERPROFILE\.cargo\bin"
          npm run tauri:build 2>&1 | Tee-Object -FilePath tauri-build.log
          $exitCode = $LASTEXITCODE
          Write-Host "Tauri build exit code: $exitCode"
          if ($exitCode -ne 0) {
            Write-Host "::error::Tauri build failed with exit code $exitCode"
            exit $exitCode
          }

      - name: List build outputs
        shell: pwsh
        run: |
          Write-Host "=== src-tauri/target/release ==="
          Get-ChildItem -Path "src-tauri/target/release" -ErrorAction SilentlyContinue | Format-Table Name, Length, LastWriteTime
          Write-Host "=== src-tauri/target/x86_64-pc-windows-msvc/release ==="
          Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release" -ErrorAction SilentlyContinue | Format-Table Name, Length, LastWriteTime
          Write-Host "=== All bundle dirs (recursive) ==="
          Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "bundle" -Directory -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "--- $($_.FullName) ---"
            Get-ChildItem -Path $_.FullName -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length
          }
          Write-Host "=== Search for .exe and .msi under target ==="
          Get-ChildItem -Path "src-tauri/target" -Recurse -Include "*.exe","*.msi" -ErrorAction SilentlyContinue | Format-Table FullName, Length
          Write-Host "=== Tauri build log (last 30 lines) ==="
          if (Test-Path tauri-build.log) {
            Get-Content tauri-build.log -Tail 30
          }

      - name: Upload Tauri Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Tauri-Build-Log
          path: tauri-build.log
          if-no-files-found: warn

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FretMaster-Windows-MSI
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FretMaster-Windows-NSIS
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
