name: Build Windows App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        shell: pwsh
        run: |
          $rustupPath = "$env:USERPROFILE\.cargo\bin"
          if (-not (Test-Path "$rustupPath\rustc.exe")) {
            Invoke-WebRequest -Uri 'https://win.rustup.rs/x86_64' -OutFile 'rustup-init.exe'
            .\rustup-init.exe -y --default-toolchain stable --target x86_64-pc-windows-msvc
          }
          "$rustupPath" | Out-File -FilePath $env:GITHUB_PATH -Append
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Verify Rust
        shell: pwsh
        run: |
          rustc --version
          cargo --version

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        run: npm run build
        env:
          TAURI_BUILD: true

      - name: Build Tauri App
        shell: pwsh
        run: |
          $env:PATH = "$env:PATH;$env:USERPROFILE\.cargo\bin"
          npm run tauri:build

      - name: List build outputs
        shell: pwsh
        run: |
          Get-ChildItem -Path "src-tauri/target/release" -ErrorAction SilentlyContinue
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -ErrorAction SilentlyContinue

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FretMaster-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FretMaster-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
